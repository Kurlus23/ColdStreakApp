<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ColdStreak — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; color: #67e8f9; }
    p { font-size: 0.95rem; color: #94a3b8; line-height: 1.6; max-width: 280px; }
    button {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background: #0e7490;
      color: white;
      border: none;
      border-radius: 1rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">🧊</div>
  <h1>You're offline</h1>
  <p>ColdStreak needs a connection to sync your data. Your previous sessions are still saved locally.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
